<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XO VR</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #030306;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      .a-loader-title {
        color: #f1e8df;
      }
    </style>
    <script type="module">
      import "aframe";

      const SOCIAL_LINKS = [
        { name: "Instagram", short: "IG", url: "https://instagram.com", angle: 0 },
        { name: "TikTok", short: "TT", url: "https://tiktok.com", angle: 90 },
        { name: "YouTube", short: "YT", url: "https://youtube.com", angle: 190 },
        { name: "Website", short: "XO", url: "https://example.com", angle: 285 },
      ];

      const CORE_SYMBOLS = [
        {
          name: "XO Web",
          geometry: "primitive: torus; radius: 1.05; radiusTubular: 0.035; segmentsRadial: 12; segmentsTubular: 72",
          position: "-4.95 1.78 -2.6",
          rotation: "18 58 8",
          color: "#0b151d",
          emissive: "#24435a",
          accent: "#83d7ff",
          hoverColor: "#17314a",
          scale: "1.24 1.24 1.24",
          labelOffset: "0 1.18 0",
          idleDuration: 54000,
          detail: "network",
          metalness: 0.5,
          roughness: 0.22,
        },
        {
          name: "Galata",
          geometry: "primitive: cone; radiusBottom: 0.62; radiusTop: 0.28; height: 3.7; segmentsRadial: 6",
          position: "-1.15 1.86 -5.35",
          rotation: "0 -10 0",
          color: "#171113",
          emissive: "#57312b",
          accent: "#f0a36f",
          hoverColor: "#34211d",
          scale: "1 1 1",
          labelOffset: "0 2.12 0",
          idleDuration: 68000,
          detail: "foundation",
          metalness: 0.28,
          roughness: 0.34,
        },
        {
          name: "The Locals",
          geometry: "primitive: cylinder; radius: 0.92; height: 1.62; segmentsRadial: 8",
          position: "3.55 1.08 -3.85",
          rotation: "0 18 0",
          color: "#10191b",
          emissive: "#26443f",
          accent: "#88e0c8",
          hoverColor: "#203c39",
          scale: "1.18 1 1.18",
          labelOffset: "0 1.42 0",
          idleDuration: 50000,
          detail: "formation",
          metalness: 0.38,
          roughness: 0.3,
        },
        {
          name: "Live Music Video",
          geometry: "primitive: box; width: 2.55; height: 1.24; depth: 0.28",
          position: "-3.9 1.12 2.75",
          rotation: "-3 -25 0",
          color: "#130f19",
          emissive: "#3f284e",
          accent: "#d9a2ff",
          hoverColor: "#2d2239",
          scale: "1 1 1",
          labelOffset: "0 1.08 0",
          idleDuration: 62000,
          detail: "frame",
          metalness: 0.42,
          roughness: 0.2,
        },
        {
          name: "XO Merch / NPC",
          geometry: "primitive: box; width: 0.72; height: 1.32; depth: 0.38",
          position: "4.35 1.08 2.75",
          rotation: "0 170 0",
          color: "#070708",
          emissive: "#111114",
          accent: "#b7b8c0",
          hoverColor: "#101014",
          scale: "1 1 1",
          labelOffset: "0 1.42 0",
          idleDuration: 58000,
          detail: "sentinel",
          metalness: 0.12,
          roughness: 0.78,
        },
      ];

      const NETWORK_LINES = [
        { from: "0 0.08 0", to: "-4.95 0.08 -2.6", color: "#235773" },
        { from: "0 0.08 0", to: "-1.15 0.08 -5.35", color: "#713d2d" },
        { from: "0 0.08 0", to: "3.55 0.08 -3.85", color: "#2f6b61" },
        { from: "0 0.08 0", to: "-3.9 0.08 2.75", color: "#5e3a73" },
        { from: "0 0.08 0", to: "4.35 0.08 2.75", color: "#7b6124" },
        { from: "-4.95 0.07 -2.6", to: "-3.9 0.07 2.75", color: "#233f4f" },
        { from: "3.55 0.07 -3.85", to: "4.35 0.07 2.75", color: "#425233" },
        { from: "-1.15 0.07 -5.35", to: "3.55 0.07 -3.85", color: "#4b4730" },
      ];

      const DANCE_PROJECTS = [
        {
          name: "New World Dance Project",
          geometry: "primitive: torus; radius: 0.72; radiusTubular: 0.055; segmentsRadial: 12; segmentsTubular: 64",
          position: "-2.7 1.12 -1.45",
          rotation: "78 18 0",
          scale: "1.2 1.2 1.2",
          color: "#251a22",
          emissive: "#6d2e56",
          accent: "#ff8fd2",
          hoverColor: "#3b2235",
          labelOffset: "0 1.2 0",
          detail: "orbit",
          idleDuration: 38000,
        },
        {
          name: "The Locals",
          geometry: "primitive: cylinder; radius: 0.68; height: 1.36; segmentsRadial: 8",
          position: "1.25 0.98 -2.25",
          rotation: "0 22 0",
          scale: "1.08 1 1.08",
          color: "#101b18",
          emissive: "#2a5747",
          accent: "#8ef0c6",
          hoverColor: "#1e3d36",
          labelOffset: "0 1.25 0",
          detail: "ensemble",
          idleDuration: 42000,
        },
        {
          name: "Valluri Sisters Choreography Project",
          geometry: "primitive: cone; radiusBottom: 0.62; radiusTop: 0.18; height: 1.85; segmentsRadial: 7",
          position: "2.85 1.1 1.15",
          rotation: "0 -38 0",
          scale: "0.95 1 0.95",
          color: "#211811",
          emissive: "#6a3d1d",
          accent: "#ffbd78",
          hoverColor: "#382719",
          labelOffset: "0 1.5 0",
          detail: "duet",
          idleDuration: 48000,
        },
        {
          name: "Riya Patel Collective Dance Project",
          geometry: "primitive: octahedron; radius: 0.92",
          position: "-1.15 1.12 2.25",
          rotation: "12 -18 24",
          scale: "1.1 0.86 1.1",
          color: "#181429",
          emissive: "#332a6a",
          accent: "#aaa1ff",
          hoverColor: "#292247",
          labelOffset: "0 1.35 0",
          detail: "collective",
          idleDuration: 45000,
        },
      ];

      const DANCE_TRAILS = [
        { start: "-5.9 0.11 -0.65", end: "-8.25 0.11 -1.95", color: "#64304a", opacity: 0.3 },
        { start: "-8.25 0.11 -1.95", end: "-11.3 0.11 -4.1", color: "#7b3157", opacity: 0.36 },
        { start: "-11.3 0.11 -4.1", end: "-14.45 0.11 -6.75", color: "#99456a", opacity: 0.42 },
        { start: "-14.45 0.11 -6.75", end: "-17.25 0.11 -9.2", color: "#c15b7a", opacity: 0.44 },
        { start: "-17.25 0.11 -9.2", end: "-19.7 0.11 -11.4", color: "#e27e91", opacity: 0.38 },
        { start: "-19.7 0.12 -11.4", end: "-22.25 0.12 -13.05", color: "#ffbd78", opacity: 0.32 },
        { start: "-19.7 0.12 -11.4", end: "-23.4 0.12 -10.8", color: "#8ef0c6", opacity: 0.26 },
      ];

      const setMaterial = (el, values) => {
        const current = el.getAttribute("material") || {};
        el.setAttribute("material", { ...current, ...values });
      };

      AFRAME.registerComponent("billboard", {
        tick() {
          const camera = this.el.sceneEl.camera;
          if (camera) this.el.object3D.lookAt(camera.el.object3D.getWorldPosition(new THREE.Vector3()));
        },
      });

      AFRAME.registerComponent("interactive-surface", {
        schema: {
          label: { default: "" },
          hoverColor: { default: "#ffffff" },
          emissive: { default: "#ffffff" },
          hoverScale: { default: 1.12 },
          labelOffset: { default: "0 1.65 0" },
        },
        init() {
          this.homeScale = this.el.object3D.scale.clone();
          this.homeRotation = this.el.object3D.rotation.clone();
          this.baseMaterial = { ...(this.el.getAttribute("material") || {}) };

          this.label = document.createElement("a-text");
          this.label.setAttribute("value", this.data.label);
          this.label.setAttribute("align", "center");
          this.label.setAttribute("width", "3.7");
          this.label.setAttribute("color", "#eee6dd");
          this.label.setAttribute("material", "shader: flat; transparent: true; opacity: 0.78");
          this.label.setAttribute("position", this.data.labelOffset);
          this.label.setAttribute("visible", "false");
          this.label.setAttribute("billboard", "");
          this.el.appendChild(this.label);

          this.el.addEventListener("mouseenter", () => this.activate());
          this.el.addEventListener("mouseleave", () => this.deactivate());
        },
        activate() {
          this.label.setAttribute("visible", "true");
          setMaterial(this.el, {
            color: this.data.hoverColor,
            emissive: this.data.emissive,
            emissiveIntensity: 0.72,
          });
          this.el.object3D.scale.copy(this.homeScale).multiplyScalar(this.data.hoverScale);
          this.el.object3D.rotation.y = this.homeRotation.y + THREE.MathUtils.degToRad(9);
        },
        deactivate() {
          this.label.setAttribute("visible", "false");
          setMaterial(this.el, this.baseMaterial);
          this.el.object3D.scale.copy(this.homeScale);
          this.el.object3D.rotation.copy(this.homeRotation);
        },
      });

      AFRAME.registerComponent("heartbeat-core", {
        init() {
          this.socialOrbit = document.querySelector("#social-orbit");
          this.coreLight = document.querySelector("#core-light");
          this.coreAura = document.querySelector("#core-aura");
          this.outerAura = document.querySelector("#core-outer-aura");
          this.baseIntensity = 1.85;
          this.el.addEventListener("mouseenter", () => this.setActive(true));
          this.el.addEventListener("mouseleave", () => this.setActive(false));
        },
        tick(time) {
          const pulse = 1 + Math.sin(time * 0.0028) * 0.12;
          if (this.coreLight) this.coreLight.setAttribute("light", "intensity", this.baseIntensity * pulse);
          if (this.coreAura) this.coreAura.object3D.scale.setScalar(1.05 + Math.sin(time * 0.0018) * 0.035);
          if (this.outerAura) this.outerAura.object3D.scale.setScalar(1.02 + Math.sin(time * 0.0012) * 0.025);
        },
        setActive(active) {
          this.socialOrbit.setAttribute("visible", active);
          this.socialOrbit.setAttribute("animation__fade", {
            property: "scale",
            to: active ? "1 1 1" : "0.001 0.001 0.001",
            dur: 260,
            easing: "easeOutQuad",
          });
          setMaterial(this.el, {
            emissiveIntensity: active ? 1.95 : 1.16,
            color: active ? "#ff2f35" : "#b40712",
          });
          if (this.coreAura) {
            setMaterial(this.coreAura, {
              opacity: active ? 0.28 : 0.14,
            });
          }
          if (this.outerAura) {
            setMaterial(this.outerAura, {
              opacity: active ? 0.16 : 0.075,
            });
          }
        },
      });

      AFRAME.registerComponent("orbit", {
        schema: { speed: { default: 8 } },
        tick(time, delta) {
          this.el.object3D.rotation.y += THREE.MathUtils.degToRad(this.data.speed) * (delta / 1000);
        },
      });

      AFRAME.registerComponent("secret-sphere", {
        init() {
          this.baseScale = this.el.object3D.scale.clone();
          this.baseMaterial = { ...(this.el.getAttribute("material") || {}) };
          this.el.addEventListener("mouseenter", () => this.setActive(true));
          this.el.addEventListener("mouseleave", () => this.setActive(false));
        },
        tick() {
          const camera = this.el.sceneEl.camera;
          if (!camera) return;

          const cameraPosition = camera.el.object3D.getWorldPosition(new THREE.Vector3());
          const spherePosition = this.el.object3D.getWorldPosition(new THREE.Vector3());
          const nearby = cameraPosition.distanceTo(spherePosition) < 3.2;
          if (nearby !== this.nearby) {
            this.nearby = nearby;
            this.setActive(nearby);
          }
        },
        setActive(active) {
          this.el.object3D.scale.copy(this.baseScale).multiplyScalar(active ? 1.16 : 1);
          setMaterial(this.el, {
            ...this.baseMaterial,
            emissiveIntensity: active ? 1.55 : 0.9,
          });
        },
      });

      const createSocialLinks = () => {
        const orbit = document.querySelector("#social-orbit");
        SOCIAL_LINKS.forEach((link) => {
          const angle = THREE.MathUtils.degToRad(link.angle);
          const radius = 2.3;
          const x = Math.cos(angle) * radius;
          const z = Math.sin(angle) * radius;

          const group = document.createElement("a-entity");
          group.setAttribute("class", "interactive");
          group.setAttribute("position", `${x} 0 ${z}`);
          group.setAttribute("billboard", "");

          const halo = document.createElement("a-ring");
          halo.setAttribute("radius-inner", "0.31");
          halo.setAttribute("radius-outer", "0.34");
          halo.setAttribute("color", "#ff8a8a");
          halo.setAttribute("material", "shader: flat; opacity: 0.65; transparent: true");

          const text = document.createElement("a-text");
          text.setAttribute("value", link.short);
          text.setAttribute("align", "center");
          text.setAttribute("width", "2.2");
          text.setAttribute("color", "#fff2eb");
          text.setAttribute("position", "0 -0.055 0.01");
          text.setAttribute("data-url", link.url);
          text.setAttribute("title", link.name);

          group.addEventListener("click", () => window.open(link.url, "_blank", "noopener"));
          group.append(halo, text);
          orbit.appendChild(group);
        });
      };

      const addSymbolDetail = (object, project) => {
        if (project.detail === "network") {
          [0, 60, 120].forEach((rotation) => {
            const ring = document.createElement("a-ring");
            ring.setAttribute("radius-inner", "1.18");
            ring.setAttribute("radius-outer", "1.2");
            ring.setAttribute("rotation", `${rotation} ${rotation / 2} 0`);
            ring.setAttribute("material", "shader: flat; color: #6bcfff; opacity: 0.22; transparent: true; side: double");
            ring.setAttribute("animation__turn", {
              property: "rotation",
              to: `${rotation + 360} ${rotation / 2 + 180} 0`,
              dur: 52000,
              easing: "linear",
              loop: true,
            });
            object.appendChild(ring);
          });
        }

        if (project.detail === "foundation") {
          const plinth = document.createElement("a-cylinder");
          plinth.setAttribute("radius", "0.9");
          plinth.setAttribute("height", "0.16");
          plinth.setAttribute("position", "0 -1.9 0");
          plinth.setAttribute("color", "#211513");
          plinth.setAttribute("material", "emissive: #2d1510; emissiveIntensity: 0.35; roughness: 0.7");
          object.appendChild(plinth);
        }

        if (project.detail === "formation") {
          for (let index = 0; index < 6; index += 1) {
            const angle = (Math.PI * 2 * index) / 6;
          const marker = document.createElement("a-sphere");
          marker.setAttribute("radius", "0.085");
          marker.setAttribute("position", `${Math.cos(angle) * 0.94} 0.92 ${Math.sin(angle) * 0.94}`);
          marker.setAttribute("material", "color: #88e0c8; emissive: #88e0c8; emissiveIntensity: 0.55; roughness: 0.35");
          marker.setAttribute("animation__breathe", {
            property: "scale",
            from: "1 1 1",
            to: "1.28 1.28 1.28",
            dur: 1800 + index * 120,
            dir: "alternate",
            easing: "easeInOutSine",
            loop: true,
          });
          object.appendChild(marker);
        }
      }

        if (project.detail === "frame") {
          const screen = document.createElement("a-plane");
          screen.setAttribute("position", "0 0 0.16");
          screen.setAttribute("width", "2.25");
          screen.setAttribute("height", "0.88");
          screen.setAttribute("material", "shader: flat; color: #d9a2ff; opacity: 0.12; transparent: true");
          object.appendChild(screen);
        }

        if (project.detail === "sentinel") {
          const hood = document.createElement("a-sphere");
          hood.setAttribute("radius", "0.36");
          hood.setAttribute("position", "0 0.86 0.01");
          hood.setAttribute("scale", "0.95 1.08 0.78");
          hood.setAttribute("material", "color: #060607; emissive: #101014; emissiveIntensity: 0.18; roughness: 0.86; metalness: 0.06");

          const head = document.createElement("a-sphere");
          head.setAttribute("radius", "0.25");
          head.setAttribute("position", "0 0.91 0.07");
          head.setAttribute("scale", "0.86 1 0.78");
          head.setAttribute("material", "color: #030304; emissive: #08080a; emissiveIntensity: 0.12; roughness: 0.9; metalness: 0.04");

          const leftArm = document.createElement("a-cylinder");
          leftArm.setAttribute("radius", "0.07");
          leftArm.setAttribute("height", "0.98");
          leftArm.setAttribute("position", "-0.47 -0.1 0");
          leftArm.setAttribute("rotation", "0 0 -8");
          leftArm.setAttribute("material", "color: #050506; emissive: #0c0c10; emissiveIntensity: 0.1; roughness: 0.88; metalness: 0.04");

          const rightArm = document.createElement("a-cylinder");
          rightArm.setAttribute("radius", "0.07");
          rightArm.setAttribute("height", "0.98");
          rightArm.setAttribute("position", "0.47 -0.1 0");
          rightArm.setAttribute("rotation", "0 0 8");
          rightArm.setAttribute("material", "color: #050506; emissive: #0c0c10; emissiveIntensity: 0.1; roughness: 0.88; metalness: 0.04");

          const leftLeg = document.createElement("a-cylinder");
          leftLeg.setAttribute("radius", "0.09");
          leftLeg.setAttribute("height", "0.84");
          leftLeg.setAttribute("position", "-0.17 -0.98 0");
          leftLeg.setAttribute("material", "color: #040405; emissive: #09090c; emissiveIntensity: 0.08; roughness: 0.9; metalness: 0.04");

          const rightLeg = document.createElement("a-cylinder");
          rightLeg.setAttribute("radius", "0.09");
          rightLeg.setAttribute("height", "0.84");
          rightLeg.setAttribute("position", "0.17 -0.98 0");
          rightLeg.setAttribute("material", "color: #040405; emissive: #09090c; emissiveIntensity: 0.08; roughness: 0.9; metalness: 0.04");

          const logo = document.createElement("a-plane");
          logo.setAttribute("position", "0 0.18 0.196");
          logo.setAttribute("width", "0.36");
          logo.setAttribute("height", "0.36");
          logo.setAttribute("material", "shader: flat; src: #xo-logo; opacity: 0.88; transparent: true");

          const rim = document.createElement("a-entity");
          rim.setAttribute("position", "0.45 0.78 -0.3");
          rim.setAttribute("light", "type: point; color: #bfc2d8; intensity: 0.18; distance: 2.4");

          object.append(hood, head, leftArm, rightArm, leftLeg, rightLeg, logo, rim);
        }
      };

      const createNetworkLines = () => {
        const lineRoot = document.querySelector("#network-lines");
        NETWORK_LINES.forEach((line) => {
          const strand = document.createElement("a-entity");
          strand.setAttribute("line", {
            start: line.from,
            end: line.to,
            color: line.color,
            opacity: 0.38,
          });
          lineRoot.appendChild(strand);
        });
      };

      const createProjectObjects = () => {
        const projectRoot = document.querySelector("#project-objects");
        CORE_SYMBOLS.forEach((project) => {
          const object = document.createElement("a-entity");
          object.setAttribute("class", "interactive");
          object.setAttribute("geometry", project.geometry);
          object.setAttribute("position", project.position);
          object.setAttribute("rotation", project.rotation);
          object.setAttribute("scale", project.scale);
          object.setAttribute("material", {
            color: project.color,
            emissive: project.emissive,
            emissiveIntensity: 0.24,
            metalness: project.metalness ?? 0.35,
            roughness: project.roughness ?? 0.42,
          });
          object.setAttribute("shadow", "cast: true; receive: true");
          object.setAttribute("interactive-surface", {
            label: project.name,
            hoverColor: project.hoverColor,
            emissive: project.accent,
            labelOffset: project.labelOffset,
          });
          object.setAttribute("animation__idle", {
            property: "rotation",
            to: `${project.rotation.split(" ")[0]} ${Number(project.rotation.split(" ")[1]) + 360} ${project.rotation.split(" ")[2]}`,
            dur: project.idleDuration,
            easing: "linear",
            loop: true,
          });
          addSymbolDetail(object, project);
          projectRoot.appendChild(object);
        });
      };

      const addDanceDetail = (object, project) => {
        if (project.detail === "orbit") {
          [0, 72, 144].forEach((rotation, index) => {
            const ring = document.createElement("a-ring");
            ring.setAttribute("radius-inner", `${1 + index * 0.18}`);
            ring.setAttribute("radius-outer", `${1.025 + index * 0.18}`);
            ring.setAttribute("rotation", `${68 - index * 18} ${rotation} ${index * 12}`);
            ring.setAttribute("material", "shader: flat; color: #ff8fd2; opacity: 0.2; transparent: true; side: double");
            ring.setAttribute("animation__orbit", {
              property: "rotation",
              to: `${428 - index * 18} ${rotation + 180} ${index * 12}`,
              dur: 30000 + index * 7000,
              easing: "linear",
              loop: true,
            });
            object.appendChild(ring);
          });
        }

        if (project.detail === "ensemble") {
          for (let index = 0; index < 8; index += 1) {
            const angle = (Math.PI * 2 * index) / 8;
            const marker = document.createElement("a-sphere");
            marker.setAttribute("radius", "0.065");
            marker.setAttribute("position", `${Math.cos(angle) * 1.04} 0.72 ${Math.sin(angle) * 1.04}`);
            marker.setAttribute("material", "color: #8ef0c6; emissive: #8ef0c6; emissiveIntensity: 0.65; roughness: 0.3");
            marker.setAttribute("animation__pulse", {
              property: "scale",
              from: "0.88 0.88 0.88",
              to: "1.35 1.35 1.35",
              dur: 1500 + index * 90,
              dir: "alternate",
              easing: "easeInOutSine",
              loop: true,
            });
            object.appendChild(marker);
          }
        }

        if (project.detail === "duet") {
          [-0.38, 0.38].forEach((x, index) => {
            const echo = document.createElement("a-cone");
            echo.setAttribute("radius-bottom", "0.28");
            echo.setAttribute("radius-top", "0.08");
            echo.setAttribute("height", "1.15");
            echo.setAttribute("segments-radial", "7");
            echo.setAttribute("position", `${x} -0.18 ${index === 0 ? -0.18 : 0.18}`);
            echo.setAttribute("rotation", `0 ${index === 0 ? -18 : 18} 0`);
            echo.setAttribute("material", "color: #2b1b10; emissive: #ffbd78; emissiveIntensity: 0.18; metalness: 0.22; roughness: 0.34");
            object.appendChild(echo);
          });
        }

        if (project.detail === "collective") {
          [0, 45, 90, 135].forEach((rotation) => {
            const blade = document.createElement("a-plane");
            blade.setAttribute("width", "1.45");
            blade.setAttribute("height", "0.025");
            blade.setAttribute("rotation", `0 ${rotation} 0`);
            blade.setAttribute("material", "shader: flat; color: #aaa1ff; opacity: 0.28; transparent: true; side: double");
            object.appendChild(blade);
          });
        }
      };

      const createDanceRoom = () => {
        const danceRoot = document.querySelector("#dance-projects");
        DANCE_PROJECTS.forEach((project) => {
          const object = document.createElement("a-entity");
          object.setAttribute("class", "interactive");
          object.setAttribute("geometry", project.geometry);
          object.setAttribute("position", project.position);
          object.setAttribute("rotation", project.rotation);
          object.setAttribute("scale", project.scale);
          object.setAttribute("material", {
            color: project.color,
            emissive: project.emissive,
            emissiveIntensity: 0.34,
            metalness: 0.32,
            roughness: 0.28,
          });
          object.setAttribute("shadow", "cast: true; receive: true");
          object.setAttribute("interactive-surface", {
            label: project.name,
            hoverColor: project.hoverColor,
            emissive: project.accent,
            hoverScale: 1.09,
            labelOffset: project.labelOffset,
          });
          object.setAttribute("animation__dance", {
            property: "rotation",
            to: `${project.rotation.split(" ")[0]} ${Number(project.rotation.split(" ")[1]) + 360} ${project.rotation.split(" ")[2]}`,
            dur: project.idleDuration,
            easing: "linear",
            loop: true,
          });
          object.setAttribute("animation__breath", {
            property: "scale",
            from: project.scale,
            to: project.scale
              .split(" ")
              .map((value) => Number(value) * 1.035)
              .join(" "),
            dir: "alternate",
            dur: 2100,
            easing: "easeInOutSine",
            loop: true,
          });
          addDanceDetail(object, project);
          danceRoot.appendChild(object);
        });

        const trailRoot = document.querySelector("#dance-trails");
        DANCE_TRAILS.forEach((trail) => {
          const line = document.createElement("a-entity");
          line.setAttribute("line", {
            start: trail.start,
            end: trail.end,
            color: trail.color,
            opacity: trail.opacity,
          });
          trailRoot.appendChild(line);
        });
      };

      window.addEventListener("DOMContentLoaded", () => {
        createSocialLinks();
        createNetworkLines();
        createProjectObjects();
        createDanceRoom();
      });

      <!-- Desktop testing uses WASD + mouse look; WebXR remains available through A-Frame. -->
      <a-entity id="camera-rig" position="0 0 8">
        <a-camera wasd-controls="acceleration: 24" look-controls="pointerLockEnabled: true">
          <a-cursor
            raycaster="objects: .interactive"
            fuse="true"
            fuse-timeout="650"
            material="color: #f4ede5; shader: flat; opacity: 0.78"
            geometry="primitive: ring; radiusInner: 0.008; radiusOuter: 0.014"
          ></a-cursor>
        </a-camera>
      </a-entity>
      <a-entity laser-controls="hand: left" raycaster="objects: .interactive"></a-entity>
      <a-entity laser-controls="hand: right" raycaster="objects: .interactive"></a-entity>
    </a-scene>
  </body>
</html>
