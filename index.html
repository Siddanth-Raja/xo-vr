      AFRAME.registerComponent("interactive-surface", {
        schema: {
          label: { default: "" },
          hoverColor: { default: "#ffffff" },
          emissive: { default: "#ffffff" },
          hoverScale: { default: 1.12 },
          labelOffset: { default: "0 1.65 0" },
        },
        init() {
          this.homeScale = this.el.object3D.scale.clone();
          this.homeRotation = this.el.object3D.rotation.clone();
          this.baseMaterial = { ...(this.el.getAttribute("material") || {}) };

          this.label = document.createElement("a-text");
          this.label.setAttribute("value", this.data.label);
          this.label.setAttribute("align", "center");
          this.label.setAttribute("width", "3.7");
          this.label.setAttribute("color", "#eee6dd");
          this.label.setAttribute("material", "shader: flat; transparent: true; opacity: 0.78");
          this.label.setAttribute("position", this.data.labelOffset);
          this.label.setAttribute("visible", "false");
          this.label.setAttribute("billboard", "");
          this.el.appendChild(this.label);

          this.el.addEventListener("mouseenter", () => this.activate());
          this.el.addEventListener("mouseleave", () => this.deactivate());
        },
        activate() {
          this.label.setAttribute("visible", "true");
          setMaterial(this.el, {
            color: this.data.hoverColor,
            emissive: this.data.emissive,
            emissiveIntensity: 0.72,
          });
          this.el.object3D.scale.copy(this.homeScale).multiplyScalar(this.data.hoverScale);
          this.el.object3D.rotation.y = this.homeRotation.y + THREE.MathUtils.degToRad(9);
        },
        deactivate() {
          this.label.setAttribute("visible", "false");
          setMaterial(this.el, this.baseMaterial);
          this.el.object3D.scale.copy(this.homeScale);
          this.el.object3D.rotation.copy(this.homeRotation);
        },
      });

      AFRAME.registerComponent("heartbeat-core", {
        init() {
          this.socialOrbit = document.querySelector("#social-orbit");
          this.coreLight = document.querySelector("#core-light");
          this.coreAura = document.querySelector("#core-aura");
          this.outerAura = document.querySelector("#core-outer-aura");
          this.baseIntensity = 1.85;
          this.isActive = false;
          this.el.addEventListener("mouseenter", () => this.setActive(true));
          this.el.addEventListener("mouseleave", () => this.setActive(false));
        },
        tick(time) {
          const pulse = 1 + Math.sin(time * 0.0028) * 0.12;
          const presence = this.el.sceneEl.components["core-presence"];
          const proximityBoost = presence?.boost || 0;
          if (this.coreLight) {
            this.coreLight.setAttribute(
              "light",
              "intensity",
              (this.baseIntensity + proximityBoost * 0.58) * pulse,
            );
          }
          if (this.coreAura) this.coreAura.object3D.scale.setScalar(1.05 + Math.sin(time * 0.0018) * 0.035);
          if (this.outerAura) this.outerAura.object3D.scale.setScalar(1.02 + Math.sin(time * 0.0012) * 0.025);
        },
        setActive(active) {
          this.isActive = active;
          this.socialOrbit.setAttribute("visible", active);
          this.socialOrbit.setAttribute("animation__fade", {
            property: "scale",
            to: active ? "1 1 1" : "0.001 0.001 0.001",
            dur: 260,
            easing: "easeOutQuad",
          });
          setMaterial(this.el, {
            emissiveIntensity: active ? 1.95 : 1.16,
            color: active ? "#ff2f35" : "#b40712",
          });
          if (this.coreAura) {
            setMaterial(this.coreAura, {
              opacity: active ? 0.28 : 0.14,
            });
          }
          if (this.outerAura) {
            setMaterial(this.outerAura, {
              opacity: active ? 0.16 : 0.075,
            });
          }
        },
      });

      AFRAME.registerComponent("core-presence", {
        schema: {
          activationRadius: { default: INTERACTION_CONFIG.core.activationRadius },
          fullIntensityRadius: { default: INTERACTION_CONFIG.core.fullIntensityRadius },
        },
        init() {
          this.coreLight = document.querySelector("#core-light");
          this.coreAura = document.querySelector("#core-aura");
          this.outerAura = document.querySelector("#core-outer-aura");
          this.heartbeatCore = document.querySelector("#heartbeat-core");
          this.socialOrbit = document.querySelector("#social-orbit");
          this.networkLines = [];
          this.cameraPosition = new THREE.Vector3();
          this.boost = 0;
        },
        tick() {
          const camera = this.el.camera;
          if (!camera) return;

          if (!this.coreAura) this.coreAura = document.querySelector("#core-aura");
          if (!this.outerAura) this.outerAura = document.querySelector("#core-outer-aura");
          if (!this.heartbeatCore) this.heartbeatCore = document.querySelector("#heartbeat-core");
          if (!this.socialOrbit) this.socialOrbit = document.querySelector("#social-orbit");
          if (!this.networkLines.length) {
            this.networkLines = [...document.querySelectorAll(".core-network-line")];
          }

          camera.el.object3D.getWorldPosition(this.cameraPosition);
          const distance = this.cameraPosition.distanceTo(INTERACTION_CONFIG.core.center);
          const range = this.data.activationRadius - this.data.fullIntensityRadius;
          const rawBoost = THREE.MathUtils.clamp(
            (this.data.activationRadius - distance) / range,
            0,
            1,
          );
          this.boost = rawBoost * rawBoost;

          if (this.coreAura) {
            const hoverBoost = this.heartbeatCore?.components["heartbeat-core"]?.isActive ? 1 : 0;
            setMaterial(this.coreAura, {
              opacity:
                INTERACTION_CONFIG.core.baseAuraOpacity + this.boost * 0.09 + hoverBoost * 0.05,
              emissiveIntensity: 0.58 + this.boost * 0.28,
            });
          }

          if (this.outerAura) {
            const hoverBoost = this.heartbeatCore?.components["heartbeat-core"]?.isActive ? 1 : 0;
            setMaterial(this.outerAura, {
              opacity:
                INTERACTION_CONFIG.core.baseOuterAuraOpacity +
                this.boost * 0.05 +
                hoverBoost * 0.035,
              emissiveIntensity: 0.42 + this.boost * 0.18,
            });
          }

          this.networkLines.forEach((line) => {
            const currentLine = line.getAttribute("line") || {};
            const baseOpacity =
              Number(line.dataset.baseOpacity) || INTERACTION_CONFIG.core.baseNetworkOpacity;
            line.setAttribute("line", {
              ...currentLine,
              opacity: baseOpacity + this.boost * 0.24,
            });
          });

          if (this.socialOrbit) {
            this.socialOrbit.dataset.ready = this.boost > 0.18 ? "true" : "false";
          }
        },
      });

      AFRAME.registerComponent("dance-room-response", {
        schema: {
          radius: { default: INTERACTION_CONFIG.dance.radius },
          movementThreshold: { default: INTERACTION_CONFIG.dance.movementThreshold },
          stepCooldownMs: { default: INTERACTION_CONFIG.dance.stepCooldownMs },
        },
        init() {
          this.anchor = document.querySelector("#dance-room-anchor");
          this.pulse = document.querySelector("#dance-step-pulse");
          this.pulseLight = document.querySelector("#dance-step-light");
          this.cameraPosition = new THREE.Vector3();
          this.previousPosition = new THREE.Vector3();
          this.anchorPosition = new THREE.Vector3();
          this.localStepPosition = new THREE.Vector3();
          this.hasPreviousPosition = false;
          this.lastStepTime = 0;
          this.insideDanceRoom = false;
          this.pulseListenerBound = false;

          if (this.pulse) {
            this.pulseListenerBound = true;
            this.pulse.addEventListener("animationcomplete__fade", () => {
              this.pulse.setAttribute("visible", "false");
            });
          }
        },
        tick(time) {
          const camera = this.el.camera;
          if (!this.anchor) this.anchor = document.querySelector("#dance-room-anchor");
          if (!this.pulse) this.pulse = document.querySelector("#dance-step-pulse");
          if (!this.pulseLight) this.pulseLight = document.querySelector("#dance-step-light");
          if (this.pulse && !this.pulseListenerBound) {
            this.pulseListenerBound = true;
            this.pulse.addEventListener("animationcomplete__fade", () => {
              this.pulse.setAttribute("visible", "false");
            });
          }
          if (!camera || !this.anchor) return;

          camera.el.object3D.getWorldPosition(this.cameraPosition);
          this.anchor.object3D.getWorldPosition(this.anchorPosition);

          const dx = this.cameraPosition.x - this.anchorPosition.x;
          const dz = this.cameraPosition.z - this.anchorPosition.z;
          const distanceFromDanceCenter = Math.sqrt(dx * dx + dz * dz);
          const inside = distanceFromDanceCenter <= this.data.radius;

          if (inside !== this.insideDanceRoom) {
            this.insideDanceRoom = inside;
            this.setDancePresence(inside);
          }

          if (!this.hasPreviousPosition) {
            this.previousPosition.copy(this.cameraPosition);
            this.hasPreviousPosition = true;
            return;
          }

          const movementX = this.cameraPosition.x - this.previousPosition.x;
          const movementZ = this.cameraPosition.z - this.previousPosition.z;
          const movement = Math.sqrt(movementX * movementX + movementZ * movementZ);

          if (
            inside &&
            movement >= this.data.movementThreshold &&
            time - this.lastStepTime >= this.data.stepCooldownMs
          ) {
            this.lastStepTime = time;
            this.triggerStepPulse();
          }

          this.previousPosition.copy(this.cameraPosition);
        },
        setDancePresence(active) {
          this.el.setAttribute("fog", {
            ...(this.el.getAttribute("fog") || {}),
            density: active
              ? INTERACTION_CONFIG.dance.activeFogDensity
              : INTERACTION_CONFIG.dance.baseFogDensity,
          });

          if (this.pulseLight) {
            this.pulseLight.setAttribute(
              "light",
              "intensity",
              active ? INTERACTION_CONFIG.dance.baseLightIntensity : 0.05,
            );
          }
        },
        triggerStepPulse() {
          if (!this.pulse || !this.anchor) return;

          this.localStepPosition.copy(this.cameraPosition);
          this.anchor.object3D.worldToLocal(this.localStepPosition);
          this.pulse.object3D.position.set(this.localStepPosition.x, 0.24, this.localStepPosition.z);
          this.pulse.setAttribute("visible", "true");
          this.pulse.setAttribute("scale", "0.28 0.28 0.28");
          this.pulse.removeAttribute("animation__expand");
          this.pulse.removeAttribute("animation__fade");
          this.pulse.setAttribute("material", {
            shader: "flat",
            color: "#ffbd78",
            opacity: 0.34,
            transparent: true,
            side: "double",
          });
          this.pulse.setAttribute("animation__expand", {
            property: "scale",
            from: "0.28 0.28 0.28",
            to: "2.05 2.05 2.05",
            dur: 680,
            easing: "easeOutQuad",
          });
          this.pulse.setAttribute("animation__fade", {
            property: "material.opacity",
            from: 0.34,
            to: 0,
            dur: 680,
            easing: "easeOutQuad",
          });

          if (this.pulseLight) {
            this.pulseLight.object3D.position.set(
              this.localStepPosition.x,

          this.el.addEventListener("mouseleave", () => this.setActive(false));

        tick() {
          const camera = this.el.sceneEl.camera;
          if (!camera) return;

          const cameraPosition = camera.el.object3D.getWorldPosition(new THREE.Vector3());
          const spherePosition = this.el.object3D.getWorldPosition(new THREE.Vector3());
          const nearby = cameraPosition.distanceTo(spherePosition) < 3.2;

            this.nearby = nearby;
            this.setActive(nearby);
          }
        },
        setActive(active) {
          this.el.object3D.scale.copy(this.baseScale).multiplyScalar(active ? 1.16 : 1);

            emissiveIntensity: active ? 1.55 : 0.9,

          width="0.22"
          height="3"
          depth="3.3"
          color="#06070a"
          material="roughness: 0.9; metalness: 0.05"
          shadow="receive: true"
        ></a-box>
        <a-box
          position="2.1 1.5 0"
          width="0.22"
          height="3"
          depth="3.3"
          color="#06070a"
          material="roughness: 0.9; metalness: 0.05"
          shadow="receive: true"
        ></a-box>
        <a-plane
          position="0 0.01 0"
          rotation="-90 0 0"
          width="4.4"
          height="3.4"
          color="#0b0b07"
          material="roughness: 0.76; metalness: 0.12; emissive: #161005; emissiveIntensity: 0.18"
        ></a-plane>
        <a-sphere
          class="interactive"
          position="0 1.55 -0.55"

          ></a-cursor>

      <a-entity laser-controls="hand: left" raycaster="objects: .interactive"></a-entity>
      <a-entity laser-controls="hand: right" raycaster="objects: .interactive"></a-entity>
